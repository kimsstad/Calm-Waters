name: Build and deploy Pages with availability sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CW_BOOKING_FEEDS: ${{ vars.CW_BOOKING_FEEDS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate availability JSON
        run: node scripts/build-availability-json.js

      - name: Stage site files
        run: |
          mkdir -p site-dist
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='site-dist/' \
            --exclude='netlify/' \
            --exclude='GITHUB_ACTIONS_BOOKING_SETUP.md' \
            --exclude='github-actions-booking-feeds.example.json' \
            --exclude='NETLIFY_BOOKING_SETUP.md' \
            --exclude='netlify.toml' \
            --exclude='netlify-booking-feeds.example.json' \
            --exclude='ical-proxy-server.js' \
            --exclude='scripts/' \
            ./ site-dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
